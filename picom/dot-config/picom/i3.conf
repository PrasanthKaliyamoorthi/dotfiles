backend = "glx";

vsync = true;
corner-radius = 12;

active-opacity = 0.9;
inactive-opacity = 0.75;

blur-method = "dual_kawase";
blur-strength = 1;


opacity-rule = [
    "100:name = 'yuzu 1734 | Pokémon Legends: Arceus (64-bit) | 1.0.0 | RADV'",
    "100:name *= 'Citra Nightly 2104'",
    "100:class_g = 'flatpak'",
    "100:name *= 'YouTube'",
    "100:name *= 'mpv'",
    "100:name *= 'VLC'",
    "100:name *= 'Picture-in-Picture'"
];

opacity-exclude = [
  "class_g = 'mpv'",
  "class_g = 'vlc'",
  "class_g = 'Citra Nightly 2104'",
  "class_g = 'Firefox' && argb"
];


rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
];
