[colors]
background = #cc1e1e2e
background-alt = #181825
foreground = #313244
primary = #b9cef8
pink = #f1739d
blue = #7FBBB3
yellow = #f9e2af
inactive = #6c7086
secondary = #ffffff
alert = #f38ba8
disabled = #707880
text = #cdd6f4

# This is to set the distance between the modules
[padding]
modules = 10px

# Gradient Set-up
[gradient]
color-1 = #ba95e6
color-2 = #a984d5 
color-3 = #8762b3 
# color 1 for clock background
# color 2 for first modules
# color 3 for second modules

[bar/top]
width = 100%
height = 22 pt
radius = 10
# offset-y = 6
# offset-x = 0.5%
border-color = #00000000
border-left-size = 15
border-right-size = 15
border-top-size = 5
border-bottom-size = 0

# dpi = 96

override-redirect = false

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 1pt

# border-size = 4pt
# border-color = #00000000

padding-left = 1
padding-right = 1

module-margin = 0

# separator = |
# separator = ůįáô
# separator-foreground = ${colors.disabled}

# This character ; next to the fonts decides the vertical alignment.
# So the bigger the number after the ; , the lower the content will be.

font-0 = CaskaydiaCoveNerdFont:weight=bold:size=13;2
font-1 = CaskaydiaCoveNerdFont:weight=bold:size=15;2
font-2 = CaskaydiaCoveNerdFontMono:weight=bold:size=31;2
font-3 = CaskaydiaCoveNerdFont:weight=bold:size=14;2
font-4 = CaskaydiaCoveNerdFont:weight=bold:size=12;2

modules-left = xworkspaces xsslock network
modules-center = text5 text3 text1 date text2 text4 text6
modules-right = filesystem memory cpu pulseaudio backlight wlan tray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position = right

# wm-restack = generic
# wm-restack = bspwm
wm-restack = i3

# override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true

label-active = %name%
label-active-foreground = ${colors.yellow}
label-active-padding = 1

label-occupied = %name%
label-occupied-foreground = ${colors.inactive}
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/tray]
type = internal/tray
tray-spacing = 3
tray-padding = 3px
tray-foreground = ${colors.yellow}

[module/xsslock]
type = custom/script
exec = ~/.config/polybar/scripts/toggle_xsslock.sh status
click-left = ~/.config/polybar/scripts/toggle_xsslock.sh toggle

[module/network]
type = internal/network
interface = wlx00e030006065
interval = 1
format-connected = <label-connected>
label-connected = "%{F#f9e2af}Ôāę %{F#cdd6f4}%downspeed%%{F#f9e2af}Ôā™ %{F#cdd6f4}%upspeed%"
label-connected-foreground = ${colors.yellow}



[module/filesystem]
type = internal/fs
interval = 100

mount-0 = /

label-mounted-foreground = ${colors.text}
label-mounted = %{F#f9e2af}%mountpoint%%{F-}%{F#cdd6f4}%percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.text}

[module/memory]
type = internal/memory
interval = 2
format-prefix = " RAM "
format-prefix-foreground = ${colors.yellow}
label = %percentage_used:2%%
label-foreground = ${colors.text}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " CPU"
format-prefix-foreground = ${colors.yellow}
label = %percentage:2%%
label-foreground = ${colors.text}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = " ÔÄ® "
format-volume-prefix-foreground = ${colors.yellow}
format-volume = <label-volume>

label-volume = %percentage%%
label-volume-padding-right = ${padding.modules}
label-volume-foreground = ${colors.text}
label-volume-padding-left = 1

label-muted = muted 
label-muted-padding-right = ${padding.modules}
label-muted-foreground = ${colors.disabled}

;[module/backlight]
;type = internal/backlight
;card = amdgpu_bl1
;use-actual-brightness = true
;enable-scroll = true

;format = <label>
;format-prefix = "ÔÉę "
;format-prefix-foreground = ${colors.yellow}
;label = %percentage%%
;label-padding-right = ${padding.modules}
;label-foreground = ${colors.text}
;label-font = 5

[module/backlight]
type = custom/script
exec = ~/.config/polybar/scripts/backlight.sh show

scroll-up   = ~/.config/polybar/scripts/backlight.sh up
scroll-down = ~/.config/polybar/scripts/backlight.sh down


[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected


[module/wlan]
inherit = network-base
interface-type = wireless
format-connected-prefix = "%{F#f9e2af}Ôáę%{F-}  "
label-connected = On
label-connected-padding-right = ${padding.modules}
label-connected-foreground = ${colors.text}
label-connected-font = 5

format-disconnected-prefix = "%{F#f9efaf}Ôáę%{F-}  "
label-disconnected = Off
label-disconnected-padding-right = ${padding.modules}
label-disconnected-foreground = ${colors.text}
label-disconnected-font = 5


######################################
#######    Date/Time Gradient  #######

[module/text1]
type = custom/text
content = "Óāļ"
content-foreground = ${gradient.color-1}
content-background = ${gradient.color-2}
content-font = 3

[module/text2]
type = custom/text
content = "Óāľ"
content-foreground = ${gradient.color-1}
content-background = ${gradient.color-2}
content-font = 3

[module/text3]
type = custom/text
content = "Óāļ"
content-foreground = ${gradient.color-2}
content-background = ${gradient.color-3}
content-font = 3

[module/text4]
type = custom/text
content = "Óāľ"
content-foreground = ${gradient.color-2}
content-background = ${gradient.color-3}
content-font = 3

[module/text5]
type = custom/text
content = "Óāļ"
content-foreground = ${gradient.color-3}
content-font = 3

[module/text6]
type = custom/text
content = "Óāľ"
content-foreground = ${gradient.color-3}
content-font = 3

######################################
#######    Date/Time Gradient  #######

[module/date]
type = internal/date
interval = 1

date = "%I:%M %p"
date-alt = "%a %d %b - %H:%M"

label = "%date%"
label-foreground = ${colors.background}
label-background = #ba95e6
label-font = 4

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
