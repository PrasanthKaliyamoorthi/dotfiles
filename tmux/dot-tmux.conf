set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:Tc"

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin "thewtex/tmux-mem-cpu-load"
set -g @plugin "sainnhe/tmux-fzf"
set -g @plugin "tmux-plugins/tmux-cowboy"
set -g @plugin 'thepante/tmux-git-autofetch'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'laktak/extrakto'
set -g @floax-bind-menu 'm'
set -g @menus_trigger 'Space'

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

bind -n M-h select-pane -L  # M is ALT
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind -n M-H previous-window
bind -n M-L next-window

# Unbind defaults
unbind '"'
unbind %

# Bind new keys
bind '\' split-window -h    # Vertical split
bind - split-window -v    # Horizontal split


set -s escape-time 0  # otherwise lags in Vim

set -g mouse on 

# Pick a softer palette.
set -g @catppuccin_flavor 'mocha'
bind-key -r r run-shell "tmux neww tmux-cht.sh"

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Make the status line more pleasant.
set -g status-left ""
set -g status-right '#[fg=#{@thm_crust},bg=#{@thm_teal}] session: #S '

# Ensure that everything on the right side of the status line
# is included.
set -g status-right-length 100
set-window-option -g mode-keys vi
run '~/.tmux/plugins/tpm/tpm'
